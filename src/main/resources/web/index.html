<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>nebflow</title>
  <link rel="stylesheet" href="vendor/katex.min.css">
  <link rel="stylesheet" href="vendor/highlight-github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="vendor/highlight-github-dark.min.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/taskList.css">
  <link rel="stylesheet" href="css/reminder.css">
  <link rel="stylesheet" href="css/mesh.css">
  <link rel="stylesheet" href="css/sapphire.css">
  <link rel="stylesheet" href="css/split.css">
</head>
<body>
  <!-- Mesh Login Gate — full-screen overlay shown until user logs in -->
  <div id="mesh-login-gate" class="login-gate">
    <div class="login-gate-card">
      <div class="login-gate-logo">
        <svg width="48" height="48" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="var(--color-primary)" stroke-width="2" opacity="0.3"/>
          <circle cx="50" cy="50" r="30" stroke="var(--color-primary)" stroke-width="2" opacity="0.5"/>
          <circle cx="50" cy="50" r="15" stroke="var(--color-primary)" stroke-width="2" opacity="0.7"/>
          <circle cx="50" cy="50" r="5" fill="var(--color-primary)"/>
        </svg>
      </div>
      <h1 class="login-gate-title">Nebflow</h1>
      <div class="login-gate-tabs">
        <button class="login-gate-tab active" data-tab="login">登录</button>
        <button class="login-gate-tab" data-tab="register">注册</button>
      </div>
      <div class="login-gate-form">
        <input type="text" id="gate-server-url" class="login-gate-input" placeholder="服务器地址 (如 http://192.168.1.100:9090/api/mesh)">
        <input type="text" id="gate-username" class="login-gate-input" placeholder="用户名" autocomplete="username">
        <input type="password" id="gate-password" class="login-gate-input" placeholder="密码" autocomplete="current-password">
        <button id="gate-submit-btn" class="login-gate-btn">登录</button>
      </div>
      <div id="gate-error" class="login-gate-error"></div>
    </div>
  </div>

  <script>if(localStorage.getItem('nebflow_sidebar_collapsed')==='true')document.body.classList.add('sidebar-collapsed');</script>
  <!-- Sidebar — unified glass card (schedule + session list) -->
  <div id="sidebar">
    <div id="sidebar-panel">
      <div id="panel-sessions" class="panel active">
        <div class="panel-header">
          <span class="panel-title">Sessions</span>
          <div class="panel-actions">
            <button id="settings-btn" class="panel-btn" title="Settings"><i data-lucide="settings"></i></button>
            <button id="new-folder-btn" class="panel-btn"><i data-lucide="folder"></i></button>
            <button id="new-session-btn" class="panel-btn">+</button>
          </div>
        </div>

        <!-- Schedule Section (top) -->
        <div id="schedule-section">
          <div class="schedule-header">
            <span class="schedule-title">Schedule</span>
            <div class="schedule-header-right">
              <span class="schedule-count"></span>
              <button id="schedule-add-btn" class="reminder-create-btn" title="New Task"><i data-lucide="plus"></i></button>
            </div>
          </div>
          <div id="schedule-list" class="reminder-panel-body">
            <!-- Tasks rendered here by scheduled-task.js -->
          </div>
        </div>

        <div class="sidebar-section-divider"></div>

        <!-- Session List (bottom) -->
        <div id="session-list"></div>
      </div>
      <div id="panel-settings" class="panel">
        <div class="panel-header">
          <span class="panel-title">Settings</span>
          <div class="panel-actions">
            <button id="settings-back-btn" class="panel-btn" title="Back"><i data-lucide="arrow-left"></i></button>
          </div>
        </div>
        <div id="settings-content"></div>
      </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div id="main">
    <div id="header">
      <div class="header-left">
        <button id="sidebar-toggle" class="sidebar-toggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <span class="header-brand">nebflow</span>
      </div>
      <div class="header-center"><span id="session-name"></span><button id="memory-btn" class="memory-btn" style="display:none">Memory</button></div>
      <div class="header-right">
        <span id="header-model-info"></span>
        <span id="bypass-badge" class="bypass-badge hidden"><span class="bypass-badge-text"></span></span>
        <div id="bg-indicator" class="hidden">
          <span class="bg-dot"></span>
          <span class="bg-count">0</span>
        </div>
        <div id="delegate-indicator" class="hidden" title="Sub-agents running">
          <span class="delegate-dot"></span>
          <span class="delegate-count">0</span>
        </div>
        <div id="delegate-dropdown" class="hidden">
          <div class="bg-dropdown-header">Sub-agents</div>
          <div class="bg-dropdown-list"></div>
        </div>
        <div id="bg-dropdown" class="hidden">
          <div class="bg-dropdown-header">Background tasks</div>
          <div class="bg-dropdown-list"></div>
        </div>
        <div class="conn off" id="conn"></div>
      </div>
    </div>
    <div id="top-overlays">
      <div id="task-list"></div>
      <div id="notification-banner"></div>
    </div>
    <div id="chat"></div>
    <div id="status-wrap">
      <div id="lottie-spinner"></div>
      <span id="status-text"></span>
    </div>
    <div id="input-area">
      <div class="voice-overlay" id="voice-overlay">
        <div class="voice-wave"><i data-lucide="mic"></i></div>
        <div class="voice-text" id="voice-text">Listening...</div>
        <div class="voice-hint" id="voice-hint">Release to send</div>
      </div>
      <div id="input-bar">
        <button class="icon-btn" id="voice-btn"><i data-lucide="mic"></i></button>
      <div id="input-wrap" style="position:relative;">
        <div id="attachment-preview"></div>
        <div id="ask-indicator"><span id="ask-indicator-label">ASK</span><span id="ask-indicator-cancel">&times;</span></div>
        <div id="skill-indicator"><span id="skill-indicator-label">SKILL</span><span id="skill-indicator-cancel">&times;</span></div>
        <textarea id="input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
        <div id="slash-dropdown"></div>
      </div>
      <button class="icon-btn" id="attach-btn"><i data-lucide="paperclip"></i></button>
      <button id="send-btn"><i data-lucide="send"></i></button>
      <button id="stop-btn"><i data-lucide="square"></i></button>
    </div>
  </div>
  </div>

  <!-- Secondary Panel — split view for non-Jarvis sessions -->
  <div id="secondary-panel" class="hidden">
    <div class="secondary-header">
      <div class="secondary-header-info">
        <span id="secondary-session-name"></span>
        <span id="secondary-agent-badge" class="agent-badge"></span>
      </div>
      <button id="secondary-close-btn" class="secondary-close-btn" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div id="secondary-chat"></div>
    <div id="secondary-status-wrap" style="display:none">
      <div id="secondary-spinner"></div>
      <span id="secondary-status-text"></span>
    </div>
    <div id="secondary-input-area">
      <div class="secondary-input-bar">
        <textarea id="secondary-input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
        <button id="secondary-stop-btn"><i data-lucide="square"></i></button>
        <button id="secondary-send-btn"><i data-lucide="send"></i></button>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-overlay">
    <div id="modal-box">
      <div id="modal-title">New Session</div>
      <input id="modal-input" type="text" placeholder="Session name" autocomplete="off">
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Create</button>
      </div>
    </div>
    <div id="delete-box">
      <div id="delete-title">Delete Session</div>
      <div id="delete-msg"></div>
      <div id="delete-actions">
        <button id="delete-cancel">Cancel</button>
        <button id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>
  <!-- Agent Editor Modal (separate overlay) -->
  <div id="agent-overlay">
    <div id="agent-modal">
      <div id="agent-modal-title">Edit Agent</div>
      <div id="agent-modal-body">
        <div class="agent-field-label" data-i18n="agent.name">Name</div>
        <input id="agent-name-input" type="text" placeholder="Agent name" autocomplete="off">
        <div class="agent-field-label" data-i18n="agent.description">Description</div>
        <textarea id="agent-desc-input" placeholder="What does this agent do?" rows="3" spellcheck="false"></textarea>
        <div class="agent-field-label" data-i18n="agent.tools">Tools</div>
        <div id="agent-tools-grid"></div>
        <div class="agent-field-label" data-i18n="agent.mcpServers">MCP Servers</div>
        <div id="agent-mcp-grid"></div>
        <div class="agent-field-label" data-i18n="agent.systemPrompt">System Prompt</div>
        <textarea id="agent-system-input" placeholder="System prompt (Markdown)" rows="8" spellcheck="false"></textarea>
      </div>
      <div id="agent-modal-actions">
        <button id="agent-modal-cancel">Cancel</button>
        <button id="agent-modal-save">Save</button>
      </div>
    </div>
  </div>
  <!-- Memory Editor Modal (three tabs: Folder / Agent / User) -->
  <div id="memory-overlay">
    <div id="memory-modal">
      <div id="memory-modal-title">Memory</div>
      <div class="memory-tabs">
        <button class="memory-tab active" data-scope="folder">Folder</button>
        <button class="memory-tab" data-scope="agent">Agent</button>
        <button class="memory-tab" data-scope="user">User</button>
      </div>
      <div id="memory-modal-body">
        <textarea id="memory-content-input" placeholder="# Memory&#10;&#10;Key facts, decisions, context..." rows="12" spellcheck="false"></textarea>
      </div>
      <div id="memory-modal-actions">
        <button id="memory-modal-cancel">Cancel</button>
        <button id="memory-modal-save">Save</button>
      </div>
    </div>
  </div>
  <!-- Card Design Editor Modal -->
  <div id="card-design-overlay">
    <div id="card-design-modal">
      <div id="card-design-modal-title">Card Design</div>
      <div id="card-design-modal-body">
        <textarea id="card-design-input" placeholder="Card visual design guidelines (Markdown)" rows="20" spellcheck="false"></textarea>
      </div>
      <div id="card-design-modal-actions">
        <button id="card-design-modal-reset">Reset to Default</button>
        <button id="card-design-modal-cancel">Cancel</button>
        <button id="card-design-modal-save">Save</button>
      </div>
    </div>
  </div>
  <!-- Rules Editor Modal -->
  <div id="rules-overlay">
    <div id="rules-modal">
      <div id="rules-modal-title">Project Rules</div>
      <div id="rules-modal-body">
        <textarea id="rules-input" placeholder="" rows="14" spellcheck="false"></textarea>
      </div>
      <div id="rules-modal-actions">
        <button id="rules-modal-delete" style="display:none;margin-right:auto"></button>
        <button id="rules-modal-cancel">Cancel</button>
        <button id="rules-modal-save">Save</button>
      </div>
    </div>
  </div>
  <!-- Project Root Picker Modal -->
  <div id="path-picker-overlay">
    <div id="path-picker-modal">
      <div id="path-picker-title">Set Project Directory</div>
      <div id="path-picker-breadcrumb"></div>
      <div id="path-picker-list"></div>
      <div id="path-picker-actions">
        <button id="path-picker-cancel">Cancel</button>
        <button id="path-picker-clear">Clear</button>
        <button id="path-picker-select">Select This Folder</button>
      </div>
    </div>
  </div>
  <script src="vendor/lucide.min.js"></script>
  <script src="vendor/lottie.min.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/katex.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
