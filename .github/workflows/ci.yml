name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  compile:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [17]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - name: Compile
        run: sbt compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - name: Run tests
        run: sbt test

  assembly:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: [compile, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - name: Build assembly
        run: sbt assembly
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/nebflow-assembly-*.jar

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: assembly
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
          path: ./dist
      - name: Find JAR
        id: jar
        shell: bash
        run: echo "jar=$(ls dist/nebflow-assembly-*.jar | head -1)" >> $GITHUB_OUTPUT
      - name: Test version command
        shell: bash
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" version 2>&1 | head -5
      - name: Test status command
        shell: bash
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" status 2>&1 | head -5
      - name: Test doctor command
        shell: bash
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" doctor 2>&1 | head -20
      - name: Test help command
        shell: bash
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" help 2>&1 | head -20
      - name: Test start and stop
        shell: bash
        run: |
          # Start in background
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" -s &
          SERVER_PID=$!
          # Wait for server to start
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server started after ${i}s"
              break
            fi
            sleep 1
          done
          # Test REST API health endpoint
          curl -s http://localhost:8080/api/health || echo "Health check failed"
          # Stop server
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "Smoke test completed"

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: assembly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
          path: ./target/scala-3.5.2
      - name: Build Docker image
        run: docker build -t nebflow:test .
      - name: Test container starts
        run: |
          docker run -d --name nebflow-test -p 8080:8080 nebflow:test
          sleep 5
          docker logs nebflow-test 2>&1 | head -20
          # Health check
          curl -sf http://localhost:8080/api/health || echo "Health check failed"
          docker stop nebflow-test
