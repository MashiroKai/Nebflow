name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ─── Compile & Test ───
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache/v1
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}
          restore-keys: ${{ runner.os }}-sbt-

      - name: Compile
        run: sbt compile

      - name: Run tests
        run: sbt test

      - name: Build fat JAR
        run: sbt assembly

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/nebflow-assembly-*.jar

  # ─── Install test: Linux ───
  test-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: nebflow-jar

      - name: Test JAR runs on Linux
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED \
            -jar nebflow-assembly-*.jar -s 2>&1 | head -5 &
          sleep 10
          curl -s http://localhost:8080 > /dev/null && echo "✅ Linux: server started" || echo "❌ Linux: server failed"

  # ─── Install test: macOS ───
  test-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/

      - name: Test JAR runs on macOS
        run: |
          java --add-opens java.base/java.lang=ALL-UNNAMED \
            -jar target/scala-3.5.2/nebflow-assembly-*.jar -s 2>&1 | head -5 &
          sleep 10
          curl -s http://localhost:8080 > /dev/null && echo "✅ macOS: server started" || echo "❌ macOS: server failed"

  # ─── Install test: Windows ───
  test-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: nebflow-jar

      - name: Test JAR runs on Windows
        shell: pwsh
        run: |
          Start-Process java -ArgumentList "--add-opens","java.base/java.lang=ALL-UNNAMED","-jar",(Get-Item nebflow-assembly-*.jar).FullName,"-s" -NoNewWindow
          Start-Sleep 15
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing -TimeoutSec 5
            Write-Host "✅ Windows: server started"
          } catch {
            Write-Host "❌ Windows: server failed"
          }

  # ─── Publish Release ───
  release:
    needs: [build, test-linux, test-macos, test-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: nebflow-jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nebflow-assembly-*.jar
          generate_release_notes: true
