name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  SBT_OPTS: "-Xms512m -Xmx2g"

jobs:
  compile:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup sbt
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          cat > /tmp/sbt-bin/sbt << 'SCRIPT'
          #!/bin/bash
          exec java $SBT_OPTS -jar /tmp/sbt-launch.jar "$@"
          SCRIPT
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH
      - name: Compile
        shell: bash
        run: sbt compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup sbt
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          cat > /tmp/sbt-bin/sbt << 'SCRIPT'
          #!/bin/bash
          exec java $SBT_OPTS -jar /tmp/sbt-launch.jar "$@"
          SCRIPT
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH
      - name: Run tests
        run: sbt test

  assembly:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: [compile, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup sbt
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          cat > /tmp/sbt-bin/sbt << 'SCRIPT'
          #!/bin/bash
          exec java $SBT_OPTS -jar /tmp/sbt-launch.jar "$@"
          SCRIPT
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH
      - name: Build assembly
        run: sbt assembly
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/nebflow-assembly-*.jar

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: assembly
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
          path: ./dist
      - name: Find JAR
        id: jar
        shell: bash
        run: echo "jar=$(ls dist/nebflow-assembly-*.jar | head -1)" >> $GITHUB_OUTPUT

      # --- CLI smoke tests ---
      - name: Test version command
        shell: bash
        run: java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" version 2>&1 | head -5
      - name: Test status command
        shell: bash
        run: java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" status 2>&1 | head -5
      - name: Test doctor command
        shell: bash
        run: java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" doctor 2>&1 | head -20
      - name: Test help command
        shell: bash
        run: java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" help 2>&1 | head -20

      # --- Server start + REST API tests ---
      - name: Start server and test REST API
        shell: bash
        run: |
          # Start server in background
          java --add-opens java.base/java.lang=ALL-UNNAMED -jar "${{ steps.jar.outputs.jar }}" -s &
          SERVER_PID=$!

          # Wait for server to start (up to 30s)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server started after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Server did not start within 30s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          echo "--- Health check ---"
          HEALTH=$(curl -sf http://localhost:8080/api/health 2>&1) && echo "$HEALTH" || echo "FAIL: $?"

          echo "--- Static assets ---"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "GET / -> $HTTP_CODE"

          echo "--- Config endpoint ---"
          CONFIG=$(curl -sf http://localhost:8080/api/config 2>&1) && echo "${CONFIG:0:200}..." || echo "Config not available (expected without setup)"

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "--- Server tests completed ---"

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: assembly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
          path: ./target/scala-3.5.2
      - name: Build Docker image
        run: docker build -t nebflow:test .
      - name: Test container starts
        run: |
          docker run -d --name nebflow-test -p 8080:8080 nebflow:test
          sleep 5
          docker logs nebflow-test 2>&1 | head -20
          # Health check
          curl -sf http://localhost:8080/api/health || echo "Health check failed"
          docker stop nebflow-test
