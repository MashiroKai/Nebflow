name: Auto Release

on:
  push:
    branches: [release]

permissions:
  contents: write

env:
  SBT_OPTS: "-Xms512m -Xmx2g"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "  Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git tag -l | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "  Tag v${{ steps.version.outputs.version }} already exists — skipping"
            echo "skipped=true" >> $GITHUB_OUTPUT
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      # --- Build & Test ---

      - uses: actions/setup-java@v4
        if: steps.check.outputs.skipped == 'false'
        with:
          distribution: temurin
          java-version: 17

      - name: Setup sbt
        if: steps.check.outputs.skipped == 'false'
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch-1.10.10.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          printf '#!/bin/bash\nexec java $SBT_OPTS -XX:+UseParallelGC -jar /tmp/sbt-launch.jar "$@"\n' > /tmp/sbt-bin/sbt
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH

      - name: Run tests
        if: steps.check.outputs.skipped == 'false'
        run: sbt test

      - name: Build assembly
        if: steps.check.outputs.skipped == 'false'
        run: sbt assembly

      # --- Tag & Release ---

      - name: Create tag
        if: steps.check.outputs.skipped == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin release --tags

      - name: Create GitHub Release
        if: steps.check.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: target/scala-3.5.2/nebflow-assembly-*.jar
          generate_release_notes: true

      - name: Upload to COS (China mirror)
        if: steps.check.outputs.skipped == 'false'
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          pip install coscmd 2>/dev/null
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b nebflow-releases-1411212853 -e cos.accelerate.myqcloud.com
          JAR=$(ls target/scala-3.5.2/nebflow-assembly-*.jar | head -1)
          coscmd upload "$JAR" "$(basename "$JAR")" -f
          echo "  Uploaded $(basename "$JAR") to COS"
          echo -n "${{ steps.version.outputs.version }}" > /tmp/latest-version.txt
          coscmd upload /tmp/latest-version.txt latest-version.txt -f
          echo "  Uploaded latest-version.txt to COS"

      # --- Sync version back to main ---

      - name: Sync version to main
        if: steps.check.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$REPO/contents/VERSION?ref=main" --jq '.sha')
          ENCODED=$(printf '%s' "$NEW_VERSION" | base64)
          gh api "repos/$REPO/contents/VERSION" \
            -X PUT \
            -f message="chore: sync version to $NEW_VERSION after release" \
            -f content="$ENCODED" \
            -f sha="$SHA" \
            --silent
          echo "  Synced $NEW_VERSION back to main"
