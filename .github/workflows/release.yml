name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install sbt
        shell: bash
        run: |
          curl -fL "https://github.com/sbt/sbt/releases/download/v1.10.10/sbt-1.10.10.tgz" | tar xz -C /tmp
          echo "/tmp/sbt/bin" >> $GITHUB_PATH
      - name: Run tests
        run: sbt test
      - name: Build assembly
        run: sbt assembly
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/nebflow-assembly-*.jar

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *"-beta"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nebflow-assembly-*.jar
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: true

  cos-upload:
    name: Upload to COS (stable only)
    needs: github-release
    if: "!contains(github.ref, '-beta')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Install coscmd
        run: pip install coscmd
      - name: Configure coscmd
        run: |
          coscmd config set secret_id ${{ secrets.COS_SECRET_ID }}
          coscmd config set secret_key ${{ secrets.COS_SECRET_KEY }}
          coscmd config set bucket nebflow-releases-1411212853
          coscmd config set region ap-nanjing
      - name: Upload JAR to COS
        run: |
          JAR=$(ls nebflow-assembly-*.jar | head -1)
          echo "Uploading $JAR to COS..."
          coscmd upload "$JAR" "/$JAR"
          echo "Upload complete."
          # Verify
          coscmd list "/"

  update-website:
    name: Update website version
    needs: [github-release, cos-upload]
    if: "!contains(github.ref, '-beta')"
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        # The website repo picks up the latest version from GitHub Releases API
        # No action needed here — the website already queries the releases API
        run: |
          echo "Stable release ${{ github.ref }} published."
          echo "Website will pick up the new version from GitHub Releases API automatically."
