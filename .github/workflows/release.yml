name: Beta Release

on:
  push:
    tags: ["v*-beta"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup sbt
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch-1.10.10.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          printf '#!/bin/bash\nexec java $SBT_OPTS -XX:+UseParallelGC -jar /tmp/sbt-launch.jar "$@"\n' > /tmp/sbt-bin/sbt
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH
      - name: Run tests
        run: sbt test
      - name: Build assembly
        run: sbt assembly
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebflow-jar
          path: target/scala-3.5.2/nebflow-assembly-*.jar

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nebflow-jar
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release (source repo)
        uses: softprops/action-gh-release@v2
        with:
          files: nebflow-assembly-*.jar
          prerelease: true
          generate_release_notes: true

