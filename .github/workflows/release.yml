name: Beta Release

on:
  push:
    branches: [beta]

permissions:
  contents: write

env:
  SBT_OPTS: "-Xms512m -Xmx2g"

jobs:
  beta:
    name: Build & Release Beta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine beta version
        id: version
        run: |
          # Read current version (e.g., 1.1.5)
          VERSION=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # Next minor release target (e.g., 1.2.0)
          NEXT="$MAJOR.$((MINOR + 1)).0"

          # Find next beta iteration by checking existing tags
          LAST_N=0
          for tag in $(git tag -l "v${NEXT}-beta.*"); do
            N=$(echo "$tag" | sed "s/.*-beta\.//")
            if [ "$N" -gt "$LAST_N" ] 2>/dev/null; then
              LAST_N=$N
            fi
          done
          N=$((LAST_N + 1))

          BETA_VERSION="${NEXT}-beta.${N}"
          echo "$BETA_VERSION" > VERSION
          echo "  $VERSION → $BETA_VERSION"
          echo "version=$BETA_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup sbt
        shell: bash
        run: |
          curl -fL "https://repo1.maven.org/maven2/org/scala-sbt/sbt-launch/1.10.10/sbt-launch-1.10.10.jar" -o /tmp/sbt-launch.jar
          mkdir -p /tmp/sbt-bin
          printf '#!/bin/bash\nexec java $SBT_OPTS -XX:+UseParallelGC -jar /tmp/sbt-launch.jar "$@"\n' > /tmp/sbt-bin/sbt
          chmod +x /tmp/sbt-bin/sbt
          echo "/tmp/sbt-bin" >> $GITHUB_PATH

      - name: Run tests
        run: sbt test

      - name: Build assembly
        run: sbt assembly

      - name: Tag and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: target/scala-3.5.2/nebflow-assembly-*.jar
          prerelease: true
          generate_release_notes: true

      - name: Upload to COS (China mirror)
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          pip install coscmd 2>/dev/null
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b nebflow-releases-1411212853 -r ap-nanjing
          JAR=$(ls target/scala-3.5.2/nebflow-assembly-*.jar | head -1)
          coscmd upload "$JAR" "$(basename "$JAR")" -f
          echo "  Uploaded $(basename "$JAR") to COS"
